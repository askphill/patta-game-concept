<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patta International Soccer Tournament</title>
    <link rel="preload" href="assets/Neue-Pixel-Grotesk.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="style.css"/>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>
    <!-- Landscape blocker (mobile only) -->
    <div id="rotate-screen">
        <div class="rotate-content">
            <img src="assets/patta-logo.png" alt="Patta" class="rotate-logo rotate-logo--patta" />
            <p class="rotate-text">PLEASE ROTATE<br>YOUR PHONE</p>
            <img src="assets/nike-swoosh.png" alt="Nike" class="rotate-logo rotate-logo--nike" />
        </div>
    </div>

    <div id="loading-overlay">
        <!-- Phase 1: Loading bar -->
        <div class="loading-row">
            <img src="assets/patta-logo.png" alt="Patta" class="logo logo-patta" />
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <img src="assets/nike-swoosh.png" alt="Nike" class="logo logo-nike" />
        </div>

        <!-- Phase 3: Splash panel (hidden initially) -->
        <div class="splash-panel">
            <canvas id="game"></canvas>

            <!-- Game start overlay -->
            <div class="game-start-overlay">
                <div class="start-prompt">
                    <span>TAP</span>
                    <img src="assets/key-space.png" alt="Space" class="key-space" draggable="false" />
                    <span>TO START</span>
                </div>
            </div>

            <!-- Game over overlay -->
            <div class="game-over-overlay">
                <div class="game-over-score"></div>
                <button class="btn-submit-score" aria-label="Submit Score">
                    <img src="assets/btn-submit.png" alt="Submit Score" draggable="false" />
                </button>
            </div>

            <!-- Score submission overlay -->
            <div class="score-submit-overlay">
                <div class="score-submit-header">YOUR SCORE</div>
                <div class="score-submit-score"></div>
                <form class="score-submit-form" autocomplete="off">
                    <div class="pixel-input">
                        <input type="text" name="name" placeholder="USERNAME" maxlength="16" required autocomplete="off" />
                    </div>
                    <div class="pixel-input">
                        <input type="email" name="email" placeholder="EMAIL ADDRESS" required autocomplete="off" />
                    </div>
                    <div class="score-submit-error"></div>
                    <div id="turnstile-container"></div>
                    <button type="submit" class="btn-continue">
                        <span>CONTINUE</span>
                    </button>
                </form>
            </div>

            <img src="assets/tournament-title.png" alt="International Patta Soccer Tournament" class="tournament-title" />

            <!-- Phase 4: Menu buttons (hidden initially) -->
            <div class="menu-buttons">
                <button class="menu-btn btn-play" aria-label="Play Game"><img src="assets/btn-play.png" alt="Play Game" draggable="false" /></button>
                <button class="menu-btn btn-signup" aria-label="Sign Up"><img src="assets/btn-signup.png" alt="Sign Up" draggable="false" /></button>
                <button class="menu-btn btn-collection" aria-label="View Product/Collection"><img src="assets/btn-collection.png" alt="View Product/Collection" draggable="false" /></button>
                <button class="menu-btn btn-leaderboard" aria-label="View Leaderboard"><img src="assets/btn-leaderboard.png" alt="View Leaderboard" draggable="false" /></button>
            </div>
            <footer class="menu-footer">&copy; 2026 Patta. All rights reserved.</footer>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
